services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: flower_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flower_shop"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-postgres}
    networks:
      - app-network

  # Confluent 7.6.x: newer :latest images target KRaft and do not match this ZooKeeper layout.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 30"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - app-network

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: flower_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SSL_MODE: disable
      GRPC_PORT: "50052"
      HTTP_PORT: "8082"
      GIN_MODE: release
      BROKERS: kafka:29092
    ports:
      - "8082:8082"
      - "50052:50052"
    networks:
      - app-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: flower_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SSL_MODE: disable
      GRPC_PORT: "50051"
      HTTP_PORT: "8081"
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_USERNAME: demo
      SMTP_PASSWORD: demo
      PUBLIC_APP_URL: http://localhost:8088
    ports:
      - "8081:8081"
      - "50051:50051"
    networks:
      - app-network

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      inventory-service:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: flower_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SSL_MODE: disable
      GRPC_PORT: "50053"
      HTTP_PORT: "8083"
      BROKERS: kafka:29092
      INVENTORY_SERVICE_HOST: inventory-service
      INVENTORY_SERVICE_PORT: "50052"
    ports:
      - "8083:8083"
      - "50053:50053"
    networks:
      - app-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      user-service:
        condition: service_started
      inventory-service:
        condition: service_started
      order-service:
        condition: service_started
    environment:
      HTTP_PORT: "8080"
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: "50051"
      INVENTORY_SERVICE_HOST: inventory-service
      INVENTORY_SERVICE_PORT: "50052"
      ORDER_SERVICE_HOST: order-service
      ORDER_SERVICE_PORT: "50053"
      GIN_MODE: release
    ports:
      - "8080:8080"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "8088:80"
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge

